name: Mirror GitHub to Gitee

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

# 同步范围 = cyanskye 在 GitHub「自己创建(非 fork)的公开仓库」，自动包含未来新建的，
# 无需手动维护名单。只需在下面 EXCLUDE 点名「不想同步」的仓库（逗号/空格分隔），留空则全同步。
env:
  EXCLUDE: "PicGoPics, gitee-mirror"

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 生成同步名单（动态抓取，无需手改）
        id: build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LIST=$(python3 scripts/build_list.py)
          echo "本次将同步: $LIST"
          if [ -z "$LIST" ]; then
            echo "::error::生成的名单为空，已中止（防止 hub-mirror-action 在空名单时误同步全部仓库含 fork）"
            exit 1
          fi
          echo "list=$LIST" >> "$GITHUB_OUTPUT"

      - name: 镜像到 Gitee（git clone + force push，不依赖第三方 Action）
        env:
          GITEE_PRIVATE_KEY: ${{ secrets.GITEE_PRIVATE_KEY }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          REPO_LIST: ${{ steps.build.outputs.list }}
        run: |
          # 配置 SSH 密钥
          mkdir -p ~/.ssh
          echo "$GITEE_PRIVATE_KEY" > ~/.ssh/gitee_key
          chmod 600 ~/.ssh/gitee_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/gitee_key -o StrictHostKeyChecking=accept-new"

          IFS=',' read -ra repos <<< "$REPO_LIST"
          failed=""
          for repo in "${repos[@]}"; do
            [ -z "$repo" ] && continue
            echo "=== $repo ==="

            # 1. 从 GitHub clone bare 仓库
            cachedir="/tmp/mirror-cache/$repo"
            rm -rf "$cachedir"
            git clone --bare "https://github.com/cyanskye/$repo.git" "$cachedir" || {
              echo "  ❌ clone 失败"; failed="$failed $repo"; continue
            }

            # 2. 确保 Gitee 仓库存在
            gitee_status=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://gitee.com/api/v5/repos/cyanskye/$repo?access_token=$GITEE_TOKEN")
            if [ "$gitee_status" = "404" ]; then
              create_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                "https://gitee.com/api/v5/repos" \
                --data-urlencode "access_token=$GITEE_TOKEN" \
                --data-urlencode "name=$repo")
              echo "  创建 Gitee 仓库: HTTP $create_code"
            fi

            # 3. Force push 到 Gitee
            cd "$cachedir"
            git push --mirror "git@gitee.com:cyanskye/$repo.git" --force && echo "  ✅" || {
              echo "  ❌ push 失败"; failed="$failed $repo"
            }
          done

          if [ -n "$failed" ]; then
            echo "::error::同步失败:$failed"
            exit 1
          fi

      - name: 按 GitHub 状态设置 Gitee 公开/私有
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          REPO_LIST: ${{ steps.build.outputs.list }}
        run: |
          IFS=',' read -ra repos <<< "$REPO_LIST"
          for repo in "${repos[@]}"; do
            [ -z "$repo" ] && continue
            code=$(curl -s -o /tmp/gh.json -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/cyanskye/$repo")
            if [ "$code" = "200" ]; then
              priv=$(python3 -c "import json;print('true' if json.load(open('/tmp/gh.json')).get('private') else 'false')")
            else
              priv=true   # 在 GitHub 看不到（私有/不存在）-> Gitee 端保持私有
            fi
            http=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
              "https://gitee.com/api/v5/repos/cyanskye/$repo" \
              --data-urlencode "access_token=$GITEE_TOKEN" \
              --data-urlencode "name=$repo" \
              --data-urlencode "private=$priv")
            echo "$repo -> set gitee private=$priv (patch_http=$http)"
          done

      - name: 改写 README 中的 GitHub 地址为 Gitee（仅作者自己仓库）
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          REPO_LIST: ${{ steps.build.outputs.list }}
        run: python3 scripts/rewrite_readme.py
