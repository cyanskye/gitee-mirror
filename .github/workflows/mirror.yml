name: Mirror GitHub to Gitee
on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror my own repos to Gitee (forks excluded)
        uses: Yikun/hub-mirror-action@master
        with:
          src: 'github/cyanskye'
          dst: 'gitee/cyanskye'
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          account_type: 'user'
          static_list: 'cyanskye.github.io,cyanskye,xhs-live-replay-downloader,video-compression,funmagicagi,gpt-action,ChatGPT-Pro,n8n-showcase,PicGoPics'
          force_update: true
          debug: true
