name: Mirror GitHub to Gitee
on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror my own repos to Gitee (forks excluded)
        uses: Yikun/hub-mirror-action@master
        with:
          src: 'github/cyanskye'
          dst: 'gitee/cyanskye'
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          account_type: 'user'
          static_list: 'cyanskye.github.io,cyanskye,xhs-live-replay-downloader,video-compression,funmagicagi,gpt-action,ChatGPT-Pro,n8n-showcase'
          force_update: true
          debug: true

      - name: Sync visibility GitHub -> Gitee (public stays public, private stays private)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -u
          repos="cyanskye.github.io cyanskye xhs-live-replay-downloader video-compression funmagicagi gpt-action ChatGPT-Pro n8n-showcase"
          for repo in $repos; do
            code=$(curl -s -o /tmp/gh.json -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/cyanskye/$repo")
            if [ "$code" = "200" ]; then
              priv=$(python3 -c "import json;print('true' if json.load(open('/tmp/gh.json')).get('private') else 'false')")
            else
              # 在 GitHub 上看不到（私有/不存在）-> 安全起见 Gitee 端保持私有
              priv=true
            fi
            http=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
              "https://gitee.com/api/v5/repos/cyanskye/$repo" \
              --data-urlencode "access_token=$GITEE_TOKEN" \
              --data-urlencode "name=$repo" \
              --data-urlencode "private=$priv")
            echo "$repo : github_http=$code -> set gitee private=$priv (patch_http=$http)"
          done
